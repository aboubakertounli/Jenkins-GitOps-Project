<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World — Spring Boot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 3rem;
            max-width: 540px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #777;
            margin-bottom: 2rem;
        }
        .badge {
            display: inline-block;
            background: #e8eaf6;
            color: #3f51b5;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        button {
            background: #667eea;
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        button:hover { background: #5568d3; }
        button:active { transform: scale(0.98); }
        .response {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f7f7fb;
            border-radius: 8px;
            text-align: left;
            font-family: "SF Mono", Monaco, Consolas, monospace;
            font-size: 0.9rem;
            color: #333;
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 1rem;
        }
        .response.empty { color: #aaa; font-style: italic; }
        .links {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #888;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 0.5rem;
        }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">CI/CD Demo</div>
        <h1>Hello World</h1>
        <p class="subtitle">Spring Boot 3 &middot; Java 17</p>

        <button id="ping">Ping the API</button>
        <div id="response" class="response empty">Click the button to call /api/hello</div>

        <div class="links">
            <a href="/api/hello">/api/hello</a>
            <a href="/health">/health</a>
            <a href="/info">/info</a>
        </div>
    </div>

    <script>
        document.getElementById("ping").addEventListener("click", async () => {
            const out = document.getElementById("response");
            out.classList.remove("empty");
            out.textContent = "Loading...";
            try {
                const res = await fetch("/api/hello");
                const data = await res.json();
                out.textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                out.textContent = "Error: " + err.message;
            }
        });
    </script>
</body>
</html>
